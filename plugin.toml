[plugin]
id = "opencad.landsurvey"
name = "Land Survey"
version = "0.2.0"
description = "Survey points, PNEZD & LandXML import, TIN surfaces, earthwork volumes, COGO, and coordinate transforms (RTS / Helmert)"
author = "Kevin Griffin"
license = "GPL-3.0-only"

[opencad]
api_version = 2
ribbon_order = 50
command_prefixes = ["LS_"]
xdata_apps = ["LANDSURVEY_POINT", "LANDSURVEY_PLAN", "LANDSURVEY_SURFACE"]
