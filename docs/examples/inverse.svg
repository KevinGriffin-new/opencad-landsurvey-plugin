<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" role="img">
<title>Animated COGO inverse</title><desc>Two points appear, the line between them draws on, then the distance and bearing reveal.</desc>
<style>:root{--ink:var(--text-primary,#1f2328);--muted:var(--text-secondary,#57606a);}</style>
<line x1="172.5" y1="324.0" x2="507.5" y2="56.0" stroke="var(--ink)" stroke-width="2" stroke-dasharray="429.0"><animate attributeName="stroke-dashoffset" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="429.0;429.0;0;0;0;429.0"/></line>
<circle cx="172.5" cy="324.0" r="4" fill="#2ea043" opacity="1"><animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="1;1;1;1;1;1"/></circle><text x="179.5" y="317.0" font-size="12" fill="var(--muted)">A</text>
<circle cx="507.5" cy="56.0" r="4" fill="#2ea043" opacity="0"><animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="0;1;1;1;1;0"/></circle><text x="514.5" y="49.0" font-size="12" fill="var(--muted)">B</text>
<text x="340.0" y="182.0" text-anchor="middle" font-size="14" font-weight="600" fill="var(--ink)" opacity="0">dist 128.062<animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="0;0;1;1;1;0"/></text>
<text x="340" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1f6feb" opacity="0">azimuth 51.3402°   bearing N 51°20'24.69" E<animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="0;0;0;1;1;0"/></text>
<text x="340" y="370" text-anchor="middle" font-size="11" fill="var(--muted)">COGO inverse: straight-line distance + azimuth/bearing between two points</text>
</svg>
