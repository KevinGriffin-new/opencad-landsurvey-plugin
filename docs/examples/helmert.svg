<g text-anchor="middle" font-size="14" font-weight="600">
<text x="340" y="28" fill="#caa000">scale ×1.00064 (shown ×469)<animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="1;1;0;0;0;1"/></text>
