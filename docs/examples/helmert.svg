<text x="340" y="28" fill="#2ea043">fit ✓  RMS 0.053<animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.16;0.4;0.66;0.85;1" values="0;0;0;1;1;0"/></text>
