[package]
name = "opencad-landsurvey-plugin"
version = "0.3.1"
edition = "2021"
description = "Land Survey add-on for Open CAD Studio — survey points, PNEZD import, recognized-plan import, and COGO geometry."
license = "GPL-3.0-only"

# A plugin is a C-ABI dynamic library the host loads at runtime.
[lib]
crate-type = ["cdylib"]

[dependencies]
# The stable contract, with the runtime `host` surface (HostApi / BuiltinPlugin).
# Pinned to the v0.6.5 RELEASE TAG commit (the MSI host) so contract types match.
ocs_plugin_api = { git = "https://github.com/HakanSeven12/OpenCADStudio", rev = "e507e6615b8f6e035b3fe7e4cc613f4aedbc969e", features = ["host"] }

# This plugin constructs entities (Point / Line / Arc / Circle / Text) and XDATA
# records, so it names `acadrust` types directly. Must resolve to the *same*
# acadrust as the host (via the patch below) for the loaded library to be
# binary-compatible (approach B: same toolchain + dependency versions).
acadrust = "0.3.4"

# Layer-C engine — host-free COGO / PNEZD / plan parsing (std + serde only).
landsurvey = { path = "crates/landsurvey" }

# Match the v0.6.5 release's acadrust EXACTLY (from its Cargo.lock) so the
# loaded library is binary-compatible with the MSI host.
[patch.crates-io]
acadrust = { git = "https://github.com/HakanSeven12/acadrust", rev = "7b6bbf4a620540e917d6254b1c87076f76909973" }

[workspace]
members = ["crates/landsurvey", "crates/landsurvey-cli"]
